<script>
document.addEventListener("DOMContentLoaded", () => {
  const collapsible = new Set(["answer", "ideal version", "japanese translation"]);
  document.querySelectorAll(".material-content h2").forEach((heading) => {
    const key = heading.textContent.trim().toLowerCase();
    if (!collapsible.has(key)) return;
    const details = document.createElement("details");
    details.className = "reveal";
    const summary = document.createElement("summary");
    summary.textContent = heading.textContent;
    const first = heading.nextSibling;
    heading.replaceWith(details);
    details.appendChild(summary);
    let node = first;
    while (node && !(node.nodeType === 1 && /^H[12]$/.test(node.tagName))) {
      const next = node.nextSibling;
      details.appendChild(node);
      node = next;
    }
  });
});
</script>
